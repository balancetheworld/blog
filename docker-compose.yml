# Docker Compose 配置
# =====================================

services:
  # 前端服务
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: blog-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://servers:3001
    depends_on:
      - servers
    restart: unless-stopped
    networks:
      - blog-network

  # 后端服务
  servers:
    build:
      context: ./servers
      dockerfile: Dockerfile
    container_name: blog-servers
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=https://blog.smob.cc
      - DATABASE_PATH=/app/database/blog.db
      - SESSION_SECRET=${SESSION_SECRET:-change-this-to-a-random-secret-in-production}
      # 邮件服务配置 (Resend)
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-noreply@smob.cc}
      - FRONTEND_URL=${FRONTEND_URL:-https://blog.smob.cc}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    volumes:
      # 持久化数据库
      - blog-data:/app/database
      # 持久化上传的图片
      - blog-uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - blog-network

# 数据卷
volumes:
  blog-data:
    driver: local
  blog-uploads:
    driver: local

# 网络
networks:
  blog-network:
    driver: bridge
